name: Wails build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or tag to build"
        required: true
        default: "v1.2.3"

env:
  APP_NAME: "UntilThenPTBR"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: "linux/amd64"
            os: "ubuntu-latest"
            arch: "amd64"
          - platform: "windows/amd64"
            os: "windows-latest"
            arch: "amd64"

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # If triggered manually, checkout the specific ref provided in inputs
          ref: ${{ github.event.inputs.target_ref || github.ref }}

      - name: Get Tag Name
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Use the input value for manual builds
            echo "TAG_NAME=${{ github.event.inputs.target_ref }}" >> $GITHUB_ENV
          else
            # Extract tag from the git ref for tag pushes
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Set Binary Name
        shell: bash
        run: |
          # Replace slashes in platform for the filename (e.g., windows/amd64 -> windows-amd64)
          PLATFORM_STR=$(echo "${{ matrix.build.platform }}" | tr '/' '-')
          FULL_NAME="${{ env.APP_NAME }}-${{ env.TAG_NAME }}-$PLATFORM_STR"

          # Add .exe extension if on Windows
          if [[ "${{ matrix.build.os }}" == *"windows"* ]]; then
            echo "FINAL_BINARY_NAME=${FULL_NAME}.exe" >> $GITHUB_ENV
          else
            echo "FINAL_BINARY_NAME=${FULL_NAME}" >> $GITHUB_ENV
          fi

      - name: Build wails
        uses: dAppCore/build/actions/build/wails2@v4.0.0
        id: build
        with:
          build-name: ${{ env.FINAL_BINARY_NAME }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: "1.23"
          node-version: "22.x"

      - name: Compress binary with UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: build/bin/${{ env.FINAL_BINARY_NAME }}
          args: -9

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        # Run if it's a tag push OR a manual dispatch
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: build/bin/${{ env.FINAL_BINARY_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
